# .gitlab-ci.yml in infrastructure repo

stages:
  - prepare
  - update-config
  - deploy

variables:
  GIT_AUTHOR_NAME: "CI/CD Automation"
  GIT_AUTHOR_EMAIL: "ci@example.com"
  GIT_COMMITTER_NAME: "CI/CD Automation"
  GIT_COMMITTER_EMAIL: "ci@example.com"

# This job runs when triggered by the app repo
update-deployment-config:
  stage: prepare
  image: alpine:latest
  before_script:
    - apk add --no-cache git
    - mkdir -p ~/.ssh
    - echo "$GIT_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H gitlab.com >> ~/.ssh/known_hosts
    - git config --global user.name "$GIT_AUTHOR_NAME"
    - git config --global user.email "$GIT_AUTHOR_EMAIL"
  script:
    - echo "=== Deployment Configuration Update ==="
    - echo "Deploying environment: $DEPLOY_ENV"
    - echo "Docker image tag: $DOCKER_IMAGE_TAG"
    - echo "Source commit: $SOURCE_REPO_COMMIT"
    
    # Clone both repositories
    - echo "Cloning app repository..."
    - git clone --depth 1 --branch $SOURCE_REPO_BRANCH git@gitlab.com:$APP_REPO_PATH.git /tmp/app-repo
    
    - echo "Cloning infrastructure repository..."
    - git clone --depth 1 git@gitlab.com:$INFRA_REPO_PATH.git /tmp/infra-repo
    - cd /tmp/infra-repo
    
    # Verify the deployment folder exists in app repo
    - |
      if [ ! -d "/tmp/app-repo/deployment" ]; then
        echo "ERROR: deployment folder not found in app repository"
        exit 1
      fi
    
    # Determine the target stack folder in infra repo
    - TARGET_STACK_DIR="stacks/$APP_NAME"
    - |
      if [ ! -d "$TARGET_STACK_DIR" ]; then
        echo "Creating new stack directory: $TARGET_STACK_DIR"
        mkdir -p "$TARGET_STACK_DIR"
      fi
    
    # Backup existing env files before overwriting
    - |
      echo "Backing up existing env files..."
      if [ -f "$TARGET_STACK_DIR/.qs.env" ]; then
        cp "$TARGET_STACK_DIR/.qs.env" /tmp/.qs.env.bak
        echo "Backed up .qs.env"
      fi
      if [ -f "$TARGET_STACK_DIR/.prod.env" ]; then
        cp "$TARGET_STACK_DIR/.prod.env" /tmp/.prod.env.bak
        echo "Backed up .prod.env"
      fi
    
    # Remove old deployment folder contents and copy new ones from app repo
    - echo "Syncing deployment folder from app repo..."
    - rm -rf "$TARGET_STACK_DIR"/*
    - cp -r /tmp/app-repo/deployment/* "$TARGET_STACK_DIR/"
    - echo "Deployment folder synced"
    
    # Process environment files with IMAGE_TAG decision tree
    - echo "Processing environment files with IMAGE_TAG decision tree..."
    
    # Handle .qs.env
    - |
      QS_ENV_FILE="$TARGET_STACK_DIR/.qs.env"
      echo "Processing QS environment file: $QS_ENV_FILE"
      
      if [ ! -f "$QS_ENV_FILE" ]; then
        echo "Creating new .qs.env file"
        echo "IMAGE_TAG=$DOCKER_IMAGE_TAG" > "$QS_ENV_FILE"
      else
        echo "File exists, applying decision tree for .qs.env"
        
        # Decision tree for .qs.env:
        # If DEPLOY_ENV is prod, use backup value; otherwise use pipeline value
        if [ "$DEPLOY_ENV" = "prod" ]; then
          echo "DEPLOY_ENV is prod - using backup value for .qs.env IMAGE_TAG"
          if [ -f "/tmp/.qs.env.bak" ] && grep -q "^IMAGE_TAG=" "/tmp/.qs.env.bak"; then
            BACKUP_TAG=$(grep "^IMAGE_TAG=" "/tmp/.qs.env.bak" | cut -d'=' -f2)
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$BACKUP_TAG/" "$QS_ENV_FILE"
            echo "Updated .qs.env IMAGE_TAG to backup value: $BACKUP_TAG"
          else
            echo "No backup value found, skipping .qs.env IMAGE_TAG update"
          fi
        else
          echo "DEPLOY_ENV is qs - using pipeline value for .qs.env IMAGE_TAG"
          if grep -q "^IMAGE_TAG=" "$QS_ENV_FILE"; then
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$DOCKER_IMAGE_TAG/" "$QS_ENV_FILE"
          else
            echo "IMAGE_TAG=$DOCKER_IMAGE_TAG" >> "$QS_ENV_FILE"
          fi
          echo "Updated .qs.env IMAGE_TAG to pipeline value: $DOCKER_IMAGE_TAG"
        fi
      fi
    
    # Handle .prod.env
    - |
      PROD_ENV_FILE="$TARGET_STACK_DIR/.prod.env"
      echo "Processing Prod environment file: $PROD_ENV_FILE"
      
      if [ ! -f "$PROD_ENV_FILE" ]; then
        echo "Creating new .prod.env file"
        echo "IMAGE_TAG=$DOCKER_IMAGE_TAG" > "$PROD_ENV_FILE"
      else
        echo "File exists, applying decision tree for .prod.env"
        
        # Decision tree for .prod.env:
        # If DEPLOY_ENV is qs, use backup value; otherwise use pipeline value
        if [ "$DEPLOY_ENV" = "qs" ]; then
          echo "DEPLOY_ENV is qs - using backup value for .prod.env IMAGE_TAG"
          if [ -f "/tmp/.prod.env.bak" ] && grep -q "^IMAGE_TAG=" "/tmp/.prod.env.bak"; then
            BACKUP_TAG=$(grep "^IMAGE_TAG=" "/tmp/.prod.env.bak" | cut -d'=' -f2)
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$BACKUP_TAG/" "$PROD_ENV_FILE"
            echo "Updated .prod.env IMAGE_TAG to backup value: $BACKUP_TAG"
          else
            echo "No backup value found, skipping .prod.env IMAGE_TAG update"
          fi
        else
          echo "DEPLOY_ENV is prod - using pipeline value for .prod.env IMAGE_TAG"
          if grep -q "^IMAGE_TAG=" "$PROD_ENV_FILE"; then
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$DOCKER_IMAGE_TAG/" "$PROD_ENV_FILE"
          else
            echo "IMAGE_TAG=$DOCKER_IMAGE_TAG" >> "$PROD_ENV_FILE"
          fi
          echo "Updated .prod.env IMAGE_TAG to pipeline value: $DOCKER_IMAGE_TAG"
        fi
      fi
    
    # Display final env file contents
    - |
      echo ""
      echo "=== Final Environment Files ==="
      echo "--- .qs.env ---"
      cat "$TARGET_STACK_DIR/.qs.env"
      echo ""
      echo "--- .prod.env ---"
      cat "$TARGET_STACK_DIR/.prod.env"
      echo ""
    
    # Commit changes if there are any
    - echo "Checking for changes..."
    - |
      if git diff --quiet; then
        echo "No changes detected, skipping commit"
        echo "INFRA_UPDATED=false" >> build.env
      else
        echo "Changes detected, committing..."
        git add "$TARGET_STACK_DIR"
        git commit -m "Update $APP_NAME deployment for $DEPLOY_ENV environment

Source commit: $SOURCE_REPO_COMMIT
Image tag: $DOCKER_IMAGE_TAG
Triggered by: $CI_JOB_URL"
        git push origin main
        echo "Successfully pushed changes to infrastructure repo"
        echo "INFRA_UPDATED=true" >> build.env
      fi
  
  artifacts:
    reports:
      dotenv: build.env
  
  only:
    - pipelines
  when: always

# Deploy using dockhand
trigger-dockhand-deployment:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Calling dockhand webhook for $DEPLOY_ENV environment"
    - echo "App: $APP_NAME | Image Tag: $DOCKER_IMAGE_TAG"
    - |
      curl -X POST \
        -H "Authorization: Bearer $DOCKHAND_WEBHOOK_TOKEN" \
        -H "Content-Type: application/json" \
        -d "{\"environment\": \"$DEPLOY_ENV\", \"app\": \"$APP_NAME\", \"image_tag\": \"$DOCKER_IMAGE_TAG\", \"commit\": \"$SOURCE_REPO_COMMIT\"}" \
        "$DOCKHAND_WEBHOOK_URL"
    - echo "Dockhand deployment triggered successfully"
  only:
    - pipelines
  dependencies:
    - update-deployment-config
  when: on_success

# Notify app repo pipeline of success
notify-app-repo-success:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Notifying app repo of successful infrastructure update"
    - echo "Sending notification to: $APP_REPO_CALLBACK_URL"
    - |
      curl -X POST \
        -H "Authorization: Bearer $CI_JOB_TOKEN" \
        -H "Content-Type: application/json" \
        -d "{\"status\": \"success\", \"environment\": \"$DEPLOY_ENV\", \"infra_commit\": \"$CI_COMMIT_SHA\", \"app_commit\": \"$SOURCE_REPO_COMMIT\"}" \
        "$APP_REPO_CALLBACK_URL"
  only:
    - pipelines
  when: on_success
